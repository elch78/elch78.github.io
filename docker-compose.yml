services:
  jekyll:
    image: ruby:3.3
    working_dir: /site
    command: >
      bash -c "bundle install &&
      bundle exec jekyll serve --host 0.0.0.0 --force_polling --livereload"
    volumes:
      - .:/site
      - bundle:/usr/local/bundle
    ports:
      - "4000:4000"
      - "35729:35729"
    environment:
      - JEKYLL_ENV=development

volumes:
  bundle:
